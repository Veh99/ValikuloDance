services:
  postgres:
    image: postgres:16-alpine
    container_name: valikulodance_db
    environment:
      POSTGRES_DB: valikulodance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: sas07291mem
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d valikulodance"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - valikulo_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: valikulodance_backend
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=valikulodance;Username=postgres;Password=sas07291mem
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - valikulo_network

volumes:
  postgres_data:

networks:
  valikulo_network:
    driver: bridge